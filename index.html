<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Ghi Chép Nhận Máy</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --accent: #f78166;
    --accent2: #79c0ff;
    --accent3: #56d364;
    --text: #e6edf3;
    --muted: #8b949e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    font-family: 'Be Vietnam Pro', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 10px; }

  .logo {
    width: 34px; height: 34px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), #ff9580);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
  }

  .header-title { font-size: 14px; font-weight: 700; }
  .header-sub { font-size: 11px; color: var(--muted); }

  .count-badge {
    background: var(--accent);
    color: #fff;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    user-select: none;
  }

  .tab.active {
    color: var(--accent2);
    border-bottom-color: var(--accent2);
    background: rgba(121,192,255,0.05);
  }

  /* PAGES */
  .page { display: none; flex: 1; flex-direction: column; overflow: hidden; min-height: 0; }
  .page.active { display: flex; }

  /* MESSAGES */
  .messages {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 14px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    -webkit-overflow-scrolling: touch;
    min-height: 0;
  }
  .messages::-webkit-scrollbar { display: none; }

  .msg { display: flex; gap: 8px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0; margin-top: 2px;
  }
  .av-ai { background: linear-gradient(135deg, var(--accent), #ff9580); }
  .av-user { background: #1f3a5f; border: 1px solid var(--accent2); }

  .msg-body { max-width: calc(100% - 44px); }

  .bubble {
    padding: 10px 13px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
  }

  .msg.ai .bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .msg.user .bubble {
    background: #1f3a5f;
    border: 1px solid #2d4a6e;
    border-top-right-radius: 4px;
  }

  .bubble b { color: var(--accent2); }
  .ok { color: var(--accent3); font-weight: 600; }
  .err { color: var(--accent); font-weight: 600; }

  .ts { font-size: 10px; color: var(--muted); margin-top: 3px; padding: 0 2px; }
  .msg.user .ts { text-align: right; }

  /* TYPING */
  .typing-dots { display: flex; gap: 4px; padding: 2px; }
  .dot { width: 7px; height: 7px; background: var(--muted); border-radius: 50%; animation: bop 1.1s infinite; }
  .dot:nth-child(2) { animation-delay: .18s; }
  .dot:nth-child(3) { animation-delay: .36s; }
  @keyframes bop { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  /* QUICK BUTTONS */
  .quick-row {
    padding: 8px 14px 6px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
  }
  .quick-row::-webkit-scrollbar { display: none; }

  .qbtn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 13px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .qbtn:active { border-color: var(--accent2); color: var(--accent2); background: rgba(121,192,255,0.08); }

  /* INPUT BAR */
  .input-bar {
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    background: var(--surface);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 13px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    resize: none;
    min-height: 42px;
    max-height: 110px;
    outline: none;
    line-height: 1.5;
    -webkit-appearance: none;
    appearance: none;
  }
  textarea:focus { border-color: var(--accent2); }
  textarea::placeholder { color: var(--muted); }

  .send-btn {
    width: 42px; height: 42px; flex-shrink: 0;
    background: var(--accent);
    border: none; border-radius: 10px;
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .send-btn:active { opacity: 0.75; }

  /* RECORDS PAGE */
  .records-toolbar {
    padding: 10px 14px;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    align-items: center;
  }

  .toolbar-stat { flex: 1; font-size: 13px; color: var(--muted); }

  .export-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent3);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }

  .records-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    -webkit-overflow-scrolling: touch;
    min-height: 0;
  }
  .records-scroll::-webkit-scrollbar { display: none; }

  .record-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px;
    animation: fadeUp .25s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

  .rc-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 7px;
  }
  .rc-id { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); font-weight: 600; }
  .rc-time { font-size: 10px; color: var(--muted); }
  .rc-device { font-size: 15px; font-weight: 700; margin-bottom: 5px; }
  .rc-line { font-size: 13px; color: var(--muted); margin-bottom: 2px; display: flex; gap: 6px; }
  .rc-line span { flex: 1; word-break: break-word; }

  .badge {
    display: inline-block; margin-top: 8px;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 700;
  }
  .badge-wait { background: rgba(247,129,102,.15); color: var(--accent); border: 1px solid rgba(247,129,102,.3); }
  .badge-done { background: rgba(86,211,100,.15); color: var(--accent3); border: 1px solid rgba(86,211,100,.3); }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; line-height: 1.8; }
  .empty-icon { font-size: 40px; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-left">
      <div class="logo">🔧</div>
      <div>
        <div class="header-title">AI Ghi Chép Nhận Máy</div>
        <div class="header-sub">Trợ lý tiệm sửa chữa</div>
      </div>
    </div>
    <div class="count-badge" id="countBadge">0 máy</div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-chat" onclick="switchTab('chat')">💬 Chat với AI</div>
    <div class="tab" id="tab-records" onclick="switchTab('records')">📋 Danh sách máy</div>
  </div>

  <!-- CHAT -->
  <div class="page active" id="page-chat">
    <div class="messages" id="messages"></div>

    <div class="quick-row">
      <button class="qbtn" onclick="quickSend('Tôi vừa nhận 1 máy mới')">➕ Nhận máy mới</button>
      <button class="qbtn" onclick="quickSend('Tổng kết hôm nay')">📊 Tổng kết</button>
      <button class="qbtn" onclick="quickSend('Máy đã sửa xong')">✅ Hoàn thành</button>
      <button class="qbtn" onclick="switchTab('records')">📋 Xem danh sách</button>
    </div>

    <div class="input-bar">
      <textarea id="inputBox" placeholder="VD: Nhận iPhone 14 của chị Hoa, màn hình vỡ..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <!-- RECORDS -->
  <div class="page" id="page-records">
    <div class="records-toolbar">
      <div class="toolbar-stat" id="toolbarStat">Chưa có dữ liệu</div>
      <button class="export-btn" onclick="exportCSV()">⬇ Xuất CSV</button>
    </div>
    <div class="records-scroll" id="recordsList">
      <div class="empty">
        <div class="empty-icon">📭</div>
        Chưa có máy nào được ghi nhận.<br>Qua tab <b>Chat với AI</b> để bắt đầu!
      </div>
    </div>
  </div>

</div>

<script>
const SYSTEM = `Bạn là trợ lý AI ghi chép nhận máy sửa chữa. Nhiệm vụ:

1. Khi người dùng báo nhận máy mới, hỏi thu thập đủ:
   - Tên hoặc SĐT khách hàng
   - Loại thiết bị (điện thoại, laptop, máy tính bảng...)
   - Hãng và model cụ thể (iPhone 14, Samsung A55, Dell Inspiron...)
   - Tình trạng / lỗi (màn hình vỡ, không lên nguồn, hỏng cổng sạc...)
   - Ghi chú thêm nếu có (mật khẩu, phụ kiện kèm theo...)

2. Khi đã đủ thông tin, xác nhận lại với người dùng rồi kết thúc bằng dòng riêng:
§JSON§{"action":"add_record","data":{"customer":"...","device":"...","brand_model":"...","issue":"...","note":"..."}}

3. Khi người dùng muốn đánh dấu hoàn thành 1 máy, hỏi mã máy rồi xuất:
§JSON§{"action":"complete","id":"MXX"}

4. Trả lời tiếng Việt, ngắn gọn, thân thiện. Chỉ xuất §JSON§ khi đủ thông tin và xác nhận xong.`;

let records = [], history = [], counter = 1, busy = false;

const t = () => new Date().toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'});
const dt = () => new Date().toLocaleString('vi-VN',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'});
const newId = () => 'M' + String(counter++).padStart(3,'0');

function switchTab(name) {
  ['chat','records'].forEach(n => {
    document.getElementById('tab-'+n).classList.toggle('active', n===name);
    document.getElementById('page-'+name).classList.toggle('active', n===name);
  });
  // fix: properly show/hide
  document.getElementById('tab-'+name).classList.add('active');
  document.getElementById('page-'+name).classList.add('active');
  ['chat','records'].filter(n=>n!==name).forEach(n=>{
    document.getElementById('tab-'+n).classList.remove('active');
    document.getElementById('page-'+n).classList.remove('active');
  });
}

function appendMsg(role, html) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const av = document.createElement('div');
  av.className = 'avatar ' + (role==='ai'?'av-ai':'av-user');
  av.textContent = role==='ai'?'🤖':'👤';
  const body = document.createElement('div');
  body.className = 'msg-body';
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.innerHTML = html;
  const ts = document.createElement('div');
  ts.className = 'ts';
  ts.textContent = t();
  body.appendChild(bub); body.appendChild(ts);
  div.appendChild(av); div.appendChild(body);
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function fmt(s) {
  return s
    .replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')
    .replace(/✅([^\n]*)/g,'<span class="ok">✅$1</span>')
    .replace(/⚠️([^\n]*)/g,'<span class="err">⚠️$1</span>')
    .replace(/\n/g,'<br>');
}

function showTyping() {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className='msg ai'; div.id='typdiv';
  const av=document.createElement('div'); av.className='avatar av-ai'; av.textContent='🤖';
  const body=document.createElement('div'); body.className='msg-body';
  const bub=document.createElement('div'); bub.className='bubble';
  bub.innerHTML='<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  body.appendChild(bub); div.appendChild(av); div.appendChild(body);
  wrap.appendChild(div); wrap.scrollTop=wrap.scrollHeight;
}
function hideTyping() { const e=document.getElementById('typdiv'); if(e)e.remove(); }

function addRecord(data) {
  const id = newId();
  records.push({id,...data,time:dt(),status:'pending'});
  renderRecords(); updateBadge();
  return id;
}

function renderRecords() {
  const list = document.getElementById('recordsList');
  const stat = document.getElementById('toolbarStat');
  if (!records.length) {
    list.innerHTML='<div class="empty"><div class="empty-icon">📭</div>Chưa có máy nào.<br>Qua tab <b>Chat với AI</b> để bắt đầu!</div>';
    stat.textContent='Chưa có dữ liệu'; return;
  }
  const pending = records.filter(r=>r.status==='pending').length;
  stat.textContent=`${records.length} máy · ${pending} chờ · ${records.length-pending} xong`;
  list.innerHTML=[...records].reverse().map(r=>`
    <div class="record-card">
      <div class="rc-top">
        <span class="rc-id">#${r.id}</span>
        <span class="rc-time">${r.time}</span>
      </div>
      <div class="rc-device">📱 ${r.brand_model||r.device}</div>
      <div class="rc-line">👤 <span>${r.customer}</span></div>
      <div class="rc-line">🔧 <span>${r.issue}</span></div>
      ${r.note?`<div class="rc-line">📝 <span>${r.note}</span></div>`:''}
      <span class="badge ${r.status==='done'?'badge-done':'badge-wait'}">
        ${r.status==='done'?'✅ Hoàn thành':'⏳ Đang chờ'}
      </span>
    </div>
  `).join('');
}

function updateBadge() {
  const p=records.filter(r=>r.status==='pending').length;
  document.getElementById('countBadge').textContent=
    records.length ? `${records.length} máy${p?` (${p} chờ)`:''}` : '0 máy';
}

function exportCSV() {
  if(!records.length){alert('Chưa có dữ liệu!');return;}
  const h=['ID','Khách hàng','Thiết bị','Hãng/Model','Lỗi','Ghi chú','Thời gian','Trạng thái'];
  const rows=records.map(r=>[r.id,r.customer,r.device,r.brand_model||'',r.issue,r.note||'',r.time,r.status==='done'?'Hoàn thành':'Đang chờ']);
  const csv=[h,...rows].map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`may_${new Date().toLocaleDateString('vi-VN').replace(/\//g,'-')}.csv`;
  a.click();
}

async function sendMessage(preset) {
  const box = document.getElementById('inputBox');
  const text = preset || box.value.trim();
  if (!text || busy) return;
  if (!preset) { box.value=''; autoResize(box); }
  busy = true;
  appendMsg('user', fmt(text));
  history.push({role:'user',content:text});

  const ctx = records.length
    ? `\n\n[Hệ thống: ${records.length} máy - ${records.map(r=>`${r.id}:${r.brand_model||r.device}(${r.customer},${r.status==='done'?'xong':'chờ'})`).join('; ')}]`
    : '';

  showTyping();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system:SYSTEM+ctx,
        messages:history
      })
    });
    const data = await res.json();
    hideTyping();
    const full = data.content?.map(b=>b.text||'').join('')||'Có lỗi xảy ra.';
    history.push({role:'assistant',content:full});

    const jm = full.match(/§JSON§\s*(\{[\s\S]*?\})/);
    let display = full.replace(/§JSON§[\s\S]*/,'').trim();
    let extra = '';

    if (jm) {
      try {
        const act = JSON.parse(jm[1]);
        if (act.action==='add_record' && act.data) {
          const id = addRecord(act.data);
          extra=`<br><br><span class="ok">✅ Đã lưu! Mã máy: <b>#${id}</b> · <span style="cursor:pointer;text-decoration:underline;color:var(--accent2)" onclick="switchTab('records')">Xem danh sách →</span></span>`;
        } else if (act.action==='complete') {
          const rec=records.find(r=>r.id===act.id||(act.id||'').includes(r.id));
          if(rec){rec.status='done';renderRecords();updateBadge();extra=`<br><br><span class="ok">✅ Đã hoàn thành máy <b>#${rec.id}</b></span>`;}
        }
      } catch(e){}
    }
    appendMsg('ai', fmt(display)+extra);
  } catch(e) {
    hideTyping();
    appendMsg('ai','<span class="err">⚠️ Lỗi kết nối. Thử lại nhé!</span>');
  }
  busy = false;
}

function quickSend(t) { sendMessage(t); }
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,110)+'px'; }

window.onload = () => {
  setTimeout(()=>{
    appendMsg('ai',`Xin chào! Tôi là trợ lý ghi chép nhận máy 🔧<br><br>Bạn chỉ cần nhắn tự nhiên như:<br>• <b>"Nhận máy iPhone 14 của chị Lan"</b><br>• <b>"Laptop Dell không lên nguồn của anh Nam"</b><br><br>Tôi sẽ hỏi thêm nếu cần và lưu vào <b>Danh sách máy</b> cho bạn!`);
  },250);
};
</script>
</body>
</html>
